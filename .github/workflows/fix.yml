name: Fix Repo Structure
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix file locations
        run: |
          # Move files from .github/workflows/ to repo root
          [ -f ".github/workflows/requirements.txt" ] && mv .github/workflows/requirements.txt ./requirements.txt && echo "✓ Moved requirements.txt"
          [ -f ".github/workflows/insta_pipeline.py" ] && mv .github/workflows/insta_pipeline.py ./insta_pipeline.py && echo "✓ Moved insta_pipeline.py"
          [ -f ".github/workflows/hi" ] && rm .github/workflows/hi && echo "✓ Removed junk 'hi' file"

      - name: Commit and push
        run: |
          git config user.email "bot@fix.dev"
          git config user.name "Fix Bot"
          git add -A
          git diff --staged --quiet || git commit -m "fix: move files to repo root, remove junk"
          git push
