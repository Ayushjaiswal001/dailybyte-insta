name: TheDailyByte — Instagram Auto Post
on:
  workflow_dispatch:
    inputs:
      topic:   {description: "Post topic (blank=auto)", required: false, type: string}
      niche:   {description: "Niche", required: false, default: "tech", type: string}
  schedule:
    - cron: "30 3 * * *"   # Daily 9AM IST

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: "pip"}
      - run: pip install -r requirements.txt

      - name: Generate + post to Instagram
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          OUTPUT_DIR:             ./output
        run: |
          TOPIC="${{ github.event.inputs.topic || '' }}"
          NICHE="${{ github.event.inputs.niche || 'tech' }}"
          python insta_pipeline.py --topic "$TOPIC" --niche "$NICHE"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: insta-${{ github.run_id }}
          path: output/*.jpg
          retention-days: 2
